<!DOCTYPE html>
<html>
<head>
<title>Chess Level 4</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<style>
body { margin:0; background:#0b0f1a; color:white; font-family:Arial; }
#login, #menu { text-align:center; margin-top:50px; }
button { padding:10px; margin:10px; }
#ui { position:absolute; top:10px; left:10px; }
</style>
</head>

<body>

<div id="login">
<h2>Login</h2>
<input id="name" placeholder="Enter name">
<button onclick="login()">Start</button>
</div>

<div id="menu" style="display:none">
<h2>Menu</h2>
<button onclick="startBot()">Play Bot</button>
<button onclick="startOnline()">Online Multiplayer</button>
</div>

<div id="ui" style="display:none">
<div id="status"></div>
</div>

<script>
let player="";
let socket;
let game=new Chess();
let history=[];

function login(){
 player=document.getElementById("name").value;
 localStorage.setItem("player",player);
 document.getElementById("login").style.display="none";
 document.getElementById("menu").style.display="block";
}

function startBot(){
 document.getElementById("menu").style.display="none";
 document.getElementById("ui").style.display="block";
 init3D();
}

function startOnline(){
 socket=io();
 socket.emit("joinRoom","room1");

 socket.on("state", fen=>{
   game.load(fen);
   drawPieces();
 });

 document.getElementById("menu").style.display="none";
 document.getElementById("ui").style.display="block";
 init3D();
}

let scene,camera,renderer,pieces=[];

function init3D(){
 scene=new THREE.Scene();
 camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
 camera.position.set(6,10,10);

 renderer=new THREE.WebGLRenderer();
 renderer.setSize(innerWidth,innerHeight);
 document.body.appendChild(renderer.domElement);

 scene.add(new THREE.AmbientLight(0xffffff));

 for(let x=0;x<8;x++){
  for(let z=0;z<8;z++){
    let sq=new THREE.Mesh(
      new THREE.BoxGeometry(1,0.2,1),
      new THREE.MeshBasicMaterial({color:(x+z)%2?0x8b4513:0xffffff})
    );
    sq.position.set(x,0,z);
    scene.add(sq);
  }
 }

 drawPieces();
 animate();
}

function drawPieces(){
 pieces.forEach(p=>scene.remove(p));
 pieces=[];

 game.board().forEach((row,r)=>{
  row.forEach((p,c)=>{
    if(p){
      let m=new THREE.Mesh(
        new THREE.SphereGeometry(0.3),
        new THREE.MeshBasicMaterial({color:p.color==='w'?0xffffff:0x000000})
      );
      m.position.set(c,0.5,7-r);
      scene.add(m);
      pieces.push(m);
    }
  });
 });
}

function botMove(){
 let moves=game.moves();
 let move=moves[Math.floor(Math.random()*moves.length)];
 game.move(move);
 history.push(move);
 drawPieces();
}

function animate(){
 requestAnimationFrame(animate);
 renderer.render(scene,camera);
}
</script>

</body>
</html>
