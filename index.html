<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Chess</title><script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script><style>
body {
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  text-align: center;
}

#login, #game {
  margin-top: 40px;
}

#board {
  width: 320px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(8, 40px);
}

.square {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  cursor: pointer;
}

.white { background: #f0d9b5; }
.black { background: #b58863; }

.selected {
  outline: 3px solid red;
}
</style></head><body><!-- LOGIN --><div id="login">
  <h2>Enter Your Name</h2>
  <input id="name" placeholder="Your name">
  <br><br>
  <button onclick="startGame()">Start Game</button>
</div><!-- GAME --><div id="game" style="display:none;">
  <h2 id="playerName"></h2>
  <div id="board"></div>
  <p id="status"></p>
</div><script>
let game = new Chess();
let selected = null;

const pieces = {
  p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚',
  P:'♙', R:'♖', N:'♘', B:'♗', Q:'♕', K:'♔'
};

// START GAME
function startGame(){
  let name = document.getElementById("name").value;
  if(!name){
    alert("Enter your name");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("playerName").innerText = "Player: " + name;

  drawBoard();
}

// DRAW BOARD
function drawBoard(){
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  let board = game.board();

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      let sq = document.createElement("div");
      sq.className = "square " + ((r+c)%2 ? "black" : "white");

      let piece = board[r][c];
      if(piece){
        let key = piece.color === 'w' ? piece.type.toUpperCase() : piece.type;
        sq.textContent = pieces[key];
      }

      let squareName = String.fromCharCode(97+c) + (8-r);
      sq.dataset.square = squareName;

      sq.onclick = () => handleClick(sq);

      boardDiv.appendChild(sq);
    }
  }

  updateStatus();
}

// HANDLE CLICK
function handleClick(square){
  let sq = square.dataset.square;

  if(selected){
    let move = game.move({
      from: selected,
      to: sq,
      promotion: 'q'
    });

    if(move){
      selected = null;
      drawBoard();
    } else {
      selected = sq;
    }
  } else {
    selected = sq;
  }
}

// STATUS
function updateStatus(){
  let status = "";

  if(game.in_checkmate()){
    status = "Checkmate!";
  } else if(game.in_draw()){
    status = "Draw!";
  } else {
    status = (game.turn() === 'w' ? "White" : "Black") + " to move";
    if(game.in_check()){
      status += " (Check!)";
    }
  }

  document.getElementById("status").innerText = status;
}
</script></body>
</html>
